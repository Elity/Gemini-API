services:
  gemini-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gemini-api-gateway:latest
    container_name: gemini-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config
      - ./data:/data
    environment:
      - CONFIG_PATH=/config/config.yaml
      - GEMINI_COOKIE_PATH=/data/cookies
